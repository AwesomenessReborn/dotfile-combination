# Kitty color scheme — ported from iTerm2 "Default" profile (dark mode)
# Font: RobotoMonoNFM-Rg 12 → on Linux, install Roboto Mono Nerd Font
#
# Usage:
#   1. Install Roboto Mono Nerd Font: https://www.nerdfonts.com/font-downloads
#   2. Copy this into ~/.config/kitty/kitty.conf  (or use: include iterm2-default-dark.conf)

font_family      RobotoMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# Cursor
cursor                  #ffffff
cursor_text_color       #000000
cursor_blink_interval   0.5

# Selection
selection_foreground    #000000
selection_background    #b3d7ff

# Background / Foreground
background              #15191f
foreground              #dcdcdc

# URL
url_color               #328eee

# Normal colors (ANSI 0-7)
color0  #14191e
color1  #b43c2a
color2  #00c200
color3  #c7c400
color4  #2744c7
color5  #c040be
color6  #00c5c7
color7  #c7c7c7

# Bright colors (ANSI 8-15)
color8  #686868
color9  #dd7975
color10 #58e790
color11 #ece100
color12 #a7abf2
color13 #e17ee1
color14 #60fdff
color15 #ffffff
